x-default: &default
  restart: on-failure
  dns:
    - 1.1.1.1
    - 1.0.0.1

configs:
  guacamole-properties:
    content: |
      guacd-hostname: guacd
      guacd-port: 4822

      postgresql-hostname: db
      postgresql-port: 5432
      postgresql-database: guacamole
      postgresql-username: admin
      postgresql-password: secret

      http-auth-header: X-Demo-User

      allowed-languages: en
      exchange-drive: /drive
      create-drive-path: true
      drive-name: shareddrive
      client-name: demo
  logback-xml:
    content: |
      <configuration>

        <!-- Default appender -->
        <appender name="GUAC-DEFAULT" class="ch.qos.logback.core.ConsoleAppender">
            <encoder>
                <pattern>%d{yyyy-MM-dd HH:mm:ss,SSS} [%thread] %-5level %logger{36} - %msg%n</pattern>
            </encoder>
        </appender>

        <!-- Read log level from environment variable LOG_LEVEL, defaulting to INFO if not set -->
        <property name="log.level" value="$${LOG_LEVEL:-INFO}" />

        <!-- Log at the level specified by the environment variable LOG_LEVEL -->
        <root level="$${log.level}">
            <appender-ref ref="GUAC-DEFAULT" />
        </root>

        <!-- Override logging levels for specific packages -->
        <logger name="org.apache.guacamole" level="$${log.level}"/>
        <logger name="net.arulraj.demo" level="$${log.level}"/>

      </configuration>

services:

  guacamole16:
    <<: *default
    image: guacamole/guacamole:1.6.0
    ports:
      - 64080:8080
    depends_on:
      guacd:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      JAVA_OPTS: -Xms1024m -Xmx2048m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m -XX:+CrashOnOutOfMemoryError
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: db
      POSTGRESQL_DATABASE: guacamole
      POSTGRESQL_USERNAME: admin
      POSTGRESQL_PASSWORD: secret
      HTTP_AUTH_HEADER: X-Demo-User
      LOGBACK_LEVEL: debug
      LOG_LEVEL: DEBUG
    configs:
      - source: logback-xml
        target: /iotium/mounted/logback.xml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/guacamole/app.css || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 1m

  guacamole15:
    <<: *default
    image: guacamole/guacamole:1.5.5
    ports:
      - 54080:8080
    depends_on:
      guacd:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      JAVA_OPTS: -Xms1024m -Xmx2048m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m -XX:+CrashOnOutOfMemoryError
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: db
      POSTGRESQL_DATABASE: guacamole
      POSTGRESQL_USERNAME: admin
      POSTGRESQL_PASSWORD: secret
      HTTP_AUTH_HEADER: X-Demo-User
      LOGBACK_LEVEL: debug
      LOG_LEVEL: DEBUG
    configs:
      - source: logback-xml
        target: /iotium/mounted/logback.xml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/guacamole/app.css || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 1m

  guacamole-init-db:
    command: ["/bin/sh", "-c", "test -e /init/initdb.sql && echo 'init file already exists' || /opt/guacamole/bin/initdb.sh --postgresql > /init/initdb.sql" ]
    user: 0:0
    image: guacamole/guacamole:1.6.0
    volumes:
      - pg-init:/init

  connection-init:
    image: curlimages/curl:latest
    user: "0"
    command: ["sh", "-c", "apk add --no-cache jq && sh /scripts/connection-init.sh"]
    restart: "no"
    depends_on:
      guacamole16:
        condition: service_healthy
    environment:
      GUACAMOLE_HOST: guacamole16
      GUACAMOLE_PORT: "8080"
      SSH_HOST: openssh
      SSH_PORT: "2222"
      RDP_HOST: rdesktop
      RDP_PORT: "3389"
      VNC_HOST: vnc
      VNC_PORT: "5900"
    volumes:
      - ./connection-init.sh:/scripts/connection-init.sh:ro

  db:
    <<: *default
    image: postgres:16.4-alpine
    ports:
      - 5432
    environment:
      PGDATA: /data/postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: guacamole
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "guacamole"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    restart: on-failure
    depends_on:
      - guacamole-init-db
    volumes:
      - pg-init:/docker-entrypoint-initdb.d
      - pg-data:/data/postgres

  guacd:
    <<: *default
    image: guacamole/guacd:1.6.0
    ports:
      - 4822
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4822 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - guac-drive:/drive:rw
      - guac-record:/record:rw

  # SSH Connection
  openssh:
    <<: *default
    environment:
      PGID: 1000
      PUID: 1000
      PASSWORD_ACCESS: 'true'
      SUDO_ACCESS: 'true'
      TZ: Asia/Kolkata
      USER_NAME: admin
      USER_PASSWORD: admin
    image: linuxserver/openssh-server:latest
    ports:
      - 2222
    restart: on-failure

volumes:
  guac-config:
  guac-drive:
  guac-record:
  pg-data:
  pg-init:
